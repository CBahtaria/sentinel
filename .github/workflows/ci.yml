name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  php-lint:
    name: PHP ${{ matrix.php-version }} syntax + lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # phpunit/phpunit ^11.5 (require-dev) needs PHP >=8.2, so the
        # effective dev floor is 8.2 even though composer.json's runtime
        # require still allows 8.0+. Lint and tests both run on 8.2/8.3.
        php-version: ["8.2", "8.3"]
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql, json, session, openssl, gd, curl, mbstring
          coverage: none

      - name: Lint PHP files
        run: |
          # Syntax-check every PHP file outside vendor/, node_modules/, server/,
          # scripts/generate_*.php (template-generators that embed heredoc-style
          # PHP-in-PHP), and a small set of corrupted-at-scaffold stubs that have
          # zero callers and were never functional (tracked as known debt — see
          # BROKEN_STUBS section in SECURITY.md). Fails the job on any other
          # parse error.
          ERRORS=0
          BAD_FILES=""
          while IFS= read -r -d '' file; do
            case "$file" in
              ./src/Security/CSRF.php|\
              ./src/health.php|\
              ./src/Auth/Authentication.php|\
              ./src/WebSocket/Server.php|\
              ./src/Collaboration/TeamManager.php)
                echo "::notice file=$file::Known broken stub — skipping lint"
                continue
                ;;
            esac
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "::error file=$file::PHP syntax error"
              php -l "$file" 2>&1 | head -3 || true
              ERRORS=$((ERRORS+1))
              BAD_FILES="$BAD_FILES\n$file"
            fi
          done < <(find . \
            -path ./vendor -prune -o \
            -path ./node_modules -prune -o \
            -path ./server/node_modules -prune -o \
            -path ./scripts -prune -o \
            -name '*.php' -print0)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS PHP file(s) had syntax errors."
            printf '%b\n' "$BAD_FILES"
            exit 1
          fi
          echo "All PHP files syntax-clean."

      - name: Composer install (if composer.json present)
        run: |
          if [ -f composer.json ]; then
            composer install --prefer-dist --no-progress --no-interaction
          else
            echo "No composer.json — skipping composer install."
          fi

      - name: Seed test .env from .env.example
        run: |
          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env
            echo "Seeded .env from .env.example for CI test run."
          fi

      - name: Composer test (if defined)
        run: |
          if [ -f composer.json ] && grep -q '"test"' composer.json; then
            composer test
          else
            echo "No 'test' script — skipping."
          fi

  node-shim:
    name: Node server shim
    runs-on: ubuntu-latest
    continue-on-error: true  # Server shim is auxiliary; failures warn, don't gate.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install
        working-directory: server
        run: npm ci || npm install --no-audit --no-fund

      - name: Audit (high+)
        working-directory: server
        run: |
          npm audit --audit-level=high \
            || echo "::warning::npm audit found high-severity findings — see SECURITY.md"

      - name: Tests (if defined)
        working-directory: server
        run: npm test --if-present

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
        continue-on-error: true
