<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="UEDF Sentinel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="1" stop-color="#1c0a13"/>
    </linearGradient>
    <radialGradient id="sweep" cx="0" cy="0" r="1">
      <stop offset="0" stop-color="#ff006e" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ff006e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff006e"/>
      <stop offset="1" stop-color="#ff4d8d"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#2a0a18" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.5"/>
  <g transform="translate(150 150)">
    <g stroke="#ff006e" stroke-width="1.5" fill="none" opacity="0.7">
      <circle r="80"/>
      <circle r="55"/>
      <circle r="30"/>
      <line x1="-90" y1="0" x2="90" y2="0" stroke-dasharray="3 3" opacity="0.4"/>
      <line x1="0" y1="-90" x2="0" y2="90" stroke-dasharray="3 3" opacity="0.4"/>
    </g>
    <path d="M 0 0 L 75 -30 A 80 80 0 0 0 75 30 Z" fill="url(#sweep)"/>
    <g fill="#ff006e">
      <circle cx="40" cy="-35" r="3"/>
      <circle cx="-20" cy="50" r="3"/>
      <circle cx="55" cy="20" r="2.5"/>
    </g>
    <g transform="translate(-25 -10)" stroke="#ff4d8d" stroke-width="2" fill="none">
      <path d="M0 0 L25 0 L37 12 L25 24 L0 24 Z" fill="#1c0a13"/>
      <line x1="6" y1="6" x2="20" y2="6"/>
      <line x1="6" y1="12" x2="20" y2="12"/>
      <line x1="6" y1="18" x2="20" y2="18"/>
    </g>
  </g>
  <text x="320" y="140" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="700" fill="#e2e8f0" letter-spacing="3">UEDF SENTINEL</text>
  <text x="320" y="180" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="20" fill="#ff006e" letter-spacing="1.5">Drone defense  ·  Command &amp; Control  ·  v5.0</text>
  <g transform="translate(320 210)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#94a3b8">
    <text x="0" y="14">RBAC  ·  2FA  ·  fleet monitoring  ·  threat detection  ·  audit log</text>
    <text x="0" y="34" fill="#ff4d8d">PHP 8  ·  MySQL  ·  WebSocket  ·  real-time C2</text>
  </g>
  <g transform="translate(1050 150)" stroke="#ff006e" stroke-width="1.5" fill="none">
    <path d="M0 -50 L40 -25 L40 25 L0 50 L-40 25 L-40 -25 Z" opacity="0.6"/>
    <path d="M-25 -10 L0 -25 L25 -10 L25 15 L0 30 L-25 15 Z" opacity="0.9"/>
    <text x="0" y="6" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#ff006e" text-anchor="middle">S</text>
  </g>
</svg>
